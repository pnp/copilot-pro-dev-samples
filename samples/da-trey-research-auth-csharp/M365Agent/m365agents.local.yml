# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.9/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.9

additionalMetadata:
  sampleTag: pnp-copilot-pro-dev:da-trey-research-auth-csharp

environmentFolderPath: ./env

provision:
  # Set required variables for local launch
  - uses: script
    with:
      run:
        echo "::set-teamsfx-env FUNC_NAME=treyresearchauth";
        echo "::set-teamsfx-env FUNC_ENDPOINT=http://localhost:7071";
        echo "::set-teamsfx-env SECRET_STORAGE_ACCOUNT_CONNECTION_STRING=UseDevelopmentStorage=true";

  # Install Node.js dependencies for scripts
  - uses: cli/runNpmCommand
    name: Install dependencies
    with:
      args: install --no-audit
      workingDirectory: ..

  # Increment manifest version
  - uses: cli/runNpmCommand
    name: Increment manifest version
    with:
      args: run increment-version
      workingDirectory: ..

  # Creates a new Microsoft Entra app to authenticate users if
  # the environment variable that stores clientId is empty
  - uses: aadApp/create
    with:
      name: trey-oauth-entra-csharp
      generateClientSecret: true
      signInAudience: AzureADMyOrg
    writeToEnvironmentFile:
      clientId: ENTRA_APP_CLIENT_ID
      clientSecret: SECRET_ENTRA_APP_CLIENT_SECRET
      objectId: ENTRA_APP_OBJECT_ID
      tenantId: ENTRA_APP_TENANT_ID
      authority: ENTRA_APP_OAUTH_AUTHORITY
      authorityHost: ENTRA_APP_OAUTH_AUTHORITY_HOST

  # Apply the Microsoft Entra manifest to an existing Microsoft Entra app.
  - uses: aadApp/update
    with:
      manifestPath: ./entra.manifest.json
      outputFilePath: ./build/entra.manifest.${{TEAMSFX_ENV}}.json

  # Creates a Teams app
  - uses: teamsApp/create
    with:
      name: TreyResearchCSharp${{APP_NAME_SUFFIX}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Set OPENAPI_SERVER_URL for local launch
  - uses: script
    with:
      run:
        echo "::set-teamsfx-env OPENAPI_SERVER_URL=https://${{DEV_TUNNEL_URL}}";
        echo "::set-teamsfx-env BOT_DOMAIN=${{DEV_TUNNEL_URL}}";

  # Register OAuth client configuration in Teams Developer Portal
  - uses: oauth/register
    with:
      name: oAuth2AuthCode
      flow: authorizationCode
      appId: ${{TEAMS_APP_ID}}
      clientId: ${{ENTRA_APP_CLIENT_ID}}
      clientSecret: ${{SECRET_ENTRA_APP_CLIENT_SECRET}}
      apiSpecPath: ./appPackage/apiSpecificationFile/trey-definition.yml
    writeToEnvironmentFile:
      configurationId: OAUTH2AUTHCODE_CONFIGURATION_ID

  - uses: oauth/update
    with:
      name: oAuth2AuthCode
      appId: ${{TEAMS_APP_ID}}
      clientId: ${{ENTRA_APP_CLIENT_ID}}
      apiSpecPath: ./appPackage/apiSpecificationFile/trey-definition.yml
      configurationId: ${{OAUTH2AUTHCODE_CONFIGURATION_ID}}

  # Generate runtime settings to JSON file
  - uses: file/createOrUpdateJsonFile
    with:
      target: ../TreyResearchApi/local.settings.json
      content:
        IsEncrypted: false
        Values:
          FUNCTIONS_WORKER_RUNTIME: "dotnet-isolated"
          STORAGE_ACCOUNT_CONNECTION_STRING: "UseDevelopmentStorage=true"
          ENTRA_APP_CLIENT_ID: ${{ENTRA_APP_CLIENT_ID}}
          ENTRA_APP_TENANT_ID: ${{ENTRA_APP_TENANT_ID}}

  # Start Azurite storage emulator in background
  - uses: script
    name: Start Azurite emulator
    with:
      run: start "Azurite" /MIN cmd /c "npx azurite --silent --location ./_storage_emulator --debug ./_storage_emulator/debug.log" & ping -n 4 127.0.0.1 >nul
      workingDirectory: ..

  # Setup database
  - uses: cli/runNpmCommand
    name: Setup database tables
    with:
      args: run db-setup
      workingDirectory: ..

  # Build Teams app package with latest env value
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  # Apply the Teams app manifest to an existing Teams app in Developer Portal.
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  # Extend your Teams app to Outlook and the Microsoft 365 app
  - uses: teamsApp/extendToM365
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      titleId: M365_TITLE_ID
      appId: M365_APP_ID
